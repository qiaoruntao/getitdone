[package]
name = "getitdone"
version = "0.1.0"
edition = "2024"

[dependencies]
pin-project-lite = "0.2"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "sync", "time"] }
uuid = { version = "1", features = ["v4"] }
thiserror = "1"
mongodb = { version = "2", default-features = false, features = ["tokio-runtime", "zstd-compression", "snappy-compression", "zlib-compression"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
bson = "2"
futures-util = "0.3"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["fmt", "env-filter"] }
opentelemetry = { version = "0.31" }
opentelemetry_sdk = { version = "0.31", features = ["rt-tokio"] }
tracing-opentelemetry = "0.32"
opentelemetry-stdout = { version = "0.31" }
tracing-opentelemetry-instrumentation-sdk = "0.32"
init-tracing-opentelemetry = { version = "0.34", features = ["otlp", "tonic", "metrics", "tracing_subscriber_ext"] }
opentelemetry-otlp = { version = "0.31", features = ["grpc-tonic", "logs", "metrics"] }
